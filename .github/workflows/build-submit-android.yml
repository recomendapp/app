name: Build and Submit Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: 🤖 Build & Submit Android
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: ⚙️ Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.INFISICAL_EXPO_TOKEN }}

      - name: ⛏️ Setup EAS local builds
        run: pnpm add -g eas-cli-local-build-plugin

      - name: 📝 Prepare Environment Files
        run: |
          cat <<EOF > apps/mobile/.env
          APP_VARIANT=production
          EXPO_PUBLIC_API_URL="${{ secrets.INFISICAL_MOBILE_EXPO_PUBLIC_API_URL }}"
          EXPO_PUBLIC_WEB_APP="${{ secrets.INFISICAL_MOBILE_EXPO_PUBLIC_WEB_APP }}"
          EXPO_PUBLIC_FACEBOOK_APP_ID="${{ secrets.INFISICAL_MOBILE_EXPO_PUBLIC_FACEBOOK_APP_ID }}"
          EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN="${{ secrets.INFISICAL_MOBILE_EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN }}"
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID="${{ secrets.INFISICAL_MOBILE_EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}"
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID="${{ secrets.INFISICAL_MOBILE_EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}"
          EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY="${{ secrets.INFISICAL_MOBILE_EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}"
          EXPO_PUBLIC_SENTRY_DSN="${{ secrets.INFISICAL_MOBILE_EXPO_PUBLIC_SENTRY_DSN }}"
          SENTRY_AUTH_TOKEN="${{ secrets.INFISICAL_MOBILE_SENTRY_AUTH_TOKEN }}"
          SENTRY_ORG="${{ secrets.INFISICAL_MOBILE_SENTRY_ORG }}"
          SENTRY_PROJECT="${{ secrets.INFISICAL_MOBILE_SENTRY_PROJECT }}"
          SENTRY_DISABLE_AUTO_UPLOAD="${{ secrets.INFISICAL_MOBILE_SENTRY_DISABLE_AUTO_UPLOAD }}"
          TMDB_IMAGE_BASE_URL="${{ secrets.INFISICAL_MOBILE_TMDB_IMAGE_BASE_URL }}"
          EOF

      - name: 📝 Prepare API Environment Files
        run: |
          # Api
          cat <<EOF > apps/api/.env
          NODE_ENV=production
          AUTH_SECRET="${{ secrets.INFISICAL_AUTH_SECRET }}"
          API_URL="${{ secrets.INFISICAL_API_URL }}"
          AUTH_GOOGLE_CLIENT_ID="${{ secrets.INFISICAL_AUTH_GOOGLE_CLIENT_ID }}"
          AUTH_GOOGLE_IOS_CLIENT_ID="${{ secrets.INFISICAL_AUTH_GOOGLE_IOS_CLIENT_ID }}"
          AUTH_GOOGLE_ANDROID_CLIENT_ID="${{ secrets.INFISICAL_AUTH_GOOGLE_ANDROID_CLIENT_ID }}"
          AUTH_GOOGLE_CLIENT_SECRET="${{ secrets.INFISICAL_AUTH_GOOGLE_CLIENT_SECRET }}"
          AUTH_GITHUB_CLIENT_ID="${{ secrets.INFISICAL_AUTH_GITHUB_CLIENT_ID }}"
          AUTH_GITHUB_CLIENT_SECRET="${{ secrets.INFISICAL_AUTH_GITHUB_CLIENT_SECRET }}"
          AUTH_FACEBOOK_CLIENT_ID="${{ secrets.INFISICAL_AUTH_FACEBOOK_CLIENT_ID }}"
          AUTH_FACEBOOK_CLIENT_SECRET="${{ secrets.INFISICAL_AUTH_FACEBOOK_CLIENT_SECRET }}"
          AUTH_APPLE_CLIENT_ID="${{ secrets.INFISICAL_AUTH_APPLE_CLIENT_ID }}"
          AUTH_APPLE_TEAM_ID="${{ secrets.INFISICAL_AUTH_APPLE_TEAM_ID }}"
          AUTH_APPLE_KEY_ID="${{ secrets.INFISICAL_AUTH_APPLE_KEY_ID }}"
          AUTH_APPLE_PRIVATE_KEY="${{ secrets.INFISICAL_AUTH_APPLE_PRIVATE_KEY }}"
          AUTH_APPLE_BUNDLE_ID="${{ secrets.INFISICAL_AUTH_APPLE_BUNDLE_ID }}"
          REVENUECAT_API_KEY="${{ secrets.INFISICAL_REVENUECAT_API_KEY }}"
          REVENUECAT_WEBHOOK_SECRET="${{ secrets.INFISICAL_REVENUECAT_WEBHOOK_SECRET }}"
          DATABASE_URL="postgres://localhost:5432/placeholder"
          S3_ENDPOINT="https://s3.example.com"
          S3_ACCESS_KEY_ID="placeholder"
          S3_SECRET_ACCESS_KEY="placeholder"
          TYPESENSE_HOST="localhost"
          TYPESENSE_API_KEY="placeholder"
          EOF

      - name: 🏗️ EAS Build (via Nx)
        env:
          GOOGLE_SERVICES_ANDROID_BASE64: ${{ secrets.INFISICAL_MOBILE_GOOGLE_SERVICES_ANDROID_BASE64 }}
        run: pnpm nx build mobile --platform android --profile production --local --non-interactive --output build.aab

      - name: 💾 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-prod-run${{ github.run_number }}-${{ github.sha }}
          path: apps/mobile/build.aab
          retention-days: 7

      - name: 🚀 EAS Submit (via Nx)
        run: pnpm nx submit mobile --platform android --path build.aab --profile production --non-interactive

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f apps/mobile/build.aab
          rm -f apps/mobile/.env
